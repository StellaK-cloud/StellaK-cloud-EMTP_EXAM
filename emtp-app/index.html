<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a2744">
<link rel="manifest" href="manifest.json">
<title>EMTP筆試練習</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#f5f6fa;--card:#fff;--primary:#1a2744;--accent:#2e75b6;--accent2:#1d9e75;--danger:#e24b4a;--warn:#ba7517;--text:#1a1a2e;--text2:#5a5a7a;--text3:#9a9ab0;--radius:14px;--shadow:0 2px 12px rgba(0,0,0,.06)}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;min-height:100dvh;padding-bottom:env(safe-area-inset-bottom)}
.screen{display:none;min-height:100vh;min-height:100dvh}
.screen.active{display:flex;flex-direction:column}
.topbar{background:var(--primary);color:#fff;padding:16px 20px;padding-top:max(16px,env(safe-area-inset-top));display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10}
.topbar h1{font-size:18px;font-weight:600;flex:1}
.topbar .back{font-size:22px;cursor:pointer;padding:4px}
.content{flex:1;padding:16px;overflow-y:auto}

/* HOME */
.logo-area{text-align:center;padding:32px 0 24px}
.logo-area .icon{font-size:48px;margin-bottom:8px}
.logo-area h2{font-size:22px;color:var(--primary);font-weight:700}
.logo-area p{font-size:13px;color:var(--text2);margin-top:4px}
.stat-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:20px}
.stat-card{background:var(--card);border-radius:var(--radius);padding:14px 10px;text-align:center;box-shadow:var(--shadow)}
.stat-card .num{font-size:24px;font-weight:700;color:var(--accent)}
.stat-card .label{font-size:11px;color:var(--text3);margin-top:2px}
.menu-btn{display:flex;align-items:center;gap:14px;background:var(--card);border-radius:var(--radius);padding:16px 18px;margin-bottom:10px;box-shadow:var(--shadow);cursor:pointer;transition:transform .15s}
.menu-btn:active{transform:scale(.97)}
.menu-btn .emoji{font-size:28px;width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.menu-btn .info h3{font-size:15px;font-weight:600}
.menu-btn .info p{font-size:12px;color:var(--text2);margin-top:2px}
.e-blue{background:#e6f1fb}.e-green{background:#e1f5ee}.e-orange{background:#faeeda}.e-red{background:#fcebeb}.e-purple{background:#eeedfe}

/* FILTER */
.filter-section{margin-bottom:18px}
.filter-section h3{font-size:14px;font-weight:600;margin-bottom:8px;color:var(--text2)}
.chip-group{display:flex;flex-wrap:wrap;gap:8px}
.chip{padding:8px 14px;border-radius:20px;font-size:13px;border:1.5px solid #ddd;cursor:pointer;background:var(--card);transition:all .2s;user-select:none}
.chip.sel{background:var(--accent);color:#fff;border-color:var(--accent)}
.chip .count{font-size:11px;opacity:.7;margin-left:3px}
.start-btn{width:100%;padding:16px;border:none;border-radius:var(--radius);background:var(--accent);color:#fff;font-size:16px;font-weight:600;cursor:pointer;margin-top:20px;transition:transform .15s}
.start-btn:active{transform:scale(.97)}
.start-btn:disabled{background:#ccc}

/* QUIZ */
.progress-bar{height:4px;background:#e0e0e0;border-radius:2px;margin-bottom:16px}
.progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .3s}
.q-counter{font-size:13px;color:var(--text3);margin-bottom:12px;display:flex;justify-content:space-between}
.q-card{background:var(--card);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);margin-bottom:16px}
.q-text{font-size:15px;line-height:1.7;margin-bottom:16px;white-space:pre-line}
.option{padding:14px 16px;border:1.5px solid #e0e0e0;border-radius:12px;margin-bottom:10px;cursor:pointer;font-size:14px;line-height:1.5;transition:all .2s;display:flex;gap:10px}
.option:active{transform:scale(.98)}
.option .letter{font-weight:700;color:var(--accent);flex-shrink:0;width:22px}
.option.correct{border-color:var(--accent2);background:#e8f8f0;color:#0a6b4a}
.option.wrong{border-color:var(--danger);background:#fef0f0;color:#a02020}
.option.dim{opacity:.5}
.option.disabled{pointer-events:none}
.explain-box{background:#f0f7ff;border-left:4px solid var(--accent);border-radius:0 12px 12px 0;padding:14px 16px;margin-top:14px;font-size:13px;line-height:1.7;color:#2a4a6a;display:none}
.explain-box.show{display:block}
.next-btn{width:100%;padding:14px;border:none;border-radius:var(--radius);background:var(--primary);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px;display:none;transition:transform .15s}
.next-btn:active{transform:scale(.97)}
.next-btn.show{display:block}

/* RESULT */
.result-card{background:var(--card);border-radius:var(--radius);padding:24px;text-align:center;box-shadow:var(--shadow);margin-bottom:20px}
.result-card .score{font-size:56px;font-weight:800;color:var(--accent)}
.result-card .total{font-size:16px;color:var(--text2)}
.result-detail{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:20px 0}
.rd{background:var(--card);border-radius:var(--radius);padding:14px;text-align:center;box-shadow:var(--shadow)}
.rd .n{font-size:22px;font-weight:700}.rd .l{font-size:12px;color:var(--text3);margin-top:2px}
.rd.green .n{color:var(--accent2)}.rd.red .n{color:var(--danger)}

/* HISTORY */
.history-item{background:var(--card);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px;box-shadow:var(--shadow);display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.history-item .left h4{font-size:14px;font-weight:600}
.history-item .left p{font-size:12px;color:var(--text3);margin-top:2px}
.history-item .right{text-align:right}
.history-item .pct{font-size:20px;font-weight:700}
.history-item .pct.good{color:var(--accent2)}.history-item .pct.bad{color:var(--danger)}.history-item .pct.mid{color:var(--warn)}
.empty-state{text-align:center;padding:40px 20px;color:var(--text3)}
.empty-state .big{font-size:48px;margin-bottom:12px}

/* WRONG REVIEW */
.wrong-summary{background:#fff3e0;border-radius:var(--radius);padding:16px;margin-bottom:16px}
.wrong-summary h3{font-size:14px;color:#e65100;margin-bottom:4px}
.wrong-summary p{font-size:13px;color:#bf360c}
</style>
</head>
<body>

<!-- HOME SCREEN -->
<div id="home" class="screen active">
  <div class="topbar"><h1>EMTP 筆試練習</h1></div>
  <div class="content">
    <div class="logo-area">
      <div class="icon">🚑</div>
      <h2>高級救護技術員</h2>
      <p>110–113年度考古題 ｜ 共400題</p>
    </div>
    <div class="stat-row">
      <div class="stat-card"><div class="num" id="s-total">0</div><div class="label">已練習</div></div>
      <div class="stat-card"><div class="num" id="s-acc">0%</div><div class="label">正確率</div></div>
      <div class="stat-card"><div class="num" id="s-wrong">0</div><div class="label">錯題數</div></div>
    </div>
    <div class="menu-btn" onclick="goFilter('all')"><div class="emoji e-blue">📝</div><div class="info"><h3>開始練習</h3><p>自選年份、分類開始作答</p></div></div>
    <div class="menu-btn" onclick="goFilter('wrong')"><div class="emoji e-red">❌</div><div class="info"><h3>錯題複習</h3><p id="wrong-count-label">針對做錯的題目再次測驗</p></div></div>
    <div class="menu-btn" onclick="goHistory()"><div class="emoji e-green">📊</div><div class="info"><h3>練習紀錄</h3><p>查看歷次練習成績</p></div></div>
    <div class="menu-btn" onclick="goFilter('random')"><div class="emoji e-purple">🎲</div><div class="info"><h3>隨機挑戰</h3><p>隨機抽25題快速測驗</p></div></div>
    <div class="menu-btn" onclick="goFilter('trap')"><div class="emoji e-orange">⚠️</div><div class="info"><h3>陷阱題特訓</h3><p>精選高頻陷阱題練習</p></div></div>
  </div>
</div>

<!-- FILTER SCREEN -->
<div id="filter" class="screen">
  <div class="topbar"><span class="back" onclick="goHome()">←</span><h1>選擇練習範圍</h1></div>
  <div class="content">
    <div class="filter-section"><h3>年度</h3><div class="chip-group" id="year-chips"></div></div>
    <div class="filter-section"><h3>主分類</h3><div class="chip-group" id="cat-chips"></div></div>
    <div id="selected-info" style="font-size:13px;color:var(--text2);margin-top:12px;text-align:center"></div>
    <button class="start-btn" id="start-btn" onclick="startQuiz()">開始練習</button>
  </div>
</div>

<!-- QUIZ SCREEN -->
<div id="quiz" class="screen">
  <div class="topbar"><span class="back" onclick="confirmQuit()">←</span><h1 id="quiz-title">練習中</h1></div>
  <div class="content">
    <div class="progress-bar"><div class="progress-fill" id="prog"></div></div>
    <div class="q-counter"><span id="q-num"></span><span id="q-cat" style="color:var(--accent);font-size:12px"></span></div>
    <div class="q-card">
      <div class="q-text" id="q-text"></div>
      <div id="options"></div>
      <div class="explain-box" id="explain"></div>
    </div>
    <button class="next-btn" id="next-btn" onclick="nextQuestion()">下一題 →</button>
  </div>
</div>

<!-- RESULT SCREEN -->
<div id="result" class="screen">
  <div class="topbar"><h1>練習結果</h1></div>
  <div class="content">
    <div class="result-card">
      <div class="score" id="r-score">0</div>
      <div class="total" id="r-total">/ 0 題</div>
    </div>
    <div class="result-detail">
      <div class="rd green"><div class="n" id="r-correct">0</div><div class="l">答對</div></div>
      <div class="rd red"><div class="n" id="r-wrong">0</div><div class="l">答錯</div></div>
    </div>
    <div id="r-wrong-section"></div>
    <div class="menu-btn" onclick="reviewWrong()" id="r-review-btn" style="display:none"><div class="emoji e-red">🔄</div><div class="info"><h3>立即複習錯題</h3><p>針對本次做錯的題目再練一次</p></div></div>
    <div class="menu-btn" onclick="goHome()"><div class="emoji e-blue">🏠</div><div class="info"><h3>回到首頁</h3><p>查看其他練習選項</p></div></div>
  </div>
</div>

<!-- HISTORY SCREEN -->
<div id="history" class="screen">
  <div class="topbar"><span class="back" onclick="goHome()">←</span><h1>練習紀錄</h1></div>
  <div class="content" id="history-list"></div>
</div>

<script>
// ============================================================
// QUESTION DATABASE (400 questions)
// ============================================================
const Q=[{"id": 0, "year": 110, "num": 1, "ans": 0, "cat": "EMS系統與法規", "sub": "醫療指導", "text": "高級救護技術員的初訓課程，是屬於哪一種的醫療指導模式？", "opts": ["前瞻性", "培育性", "即時性", "任務性"], "explain": "初訓課程屬於前瞻性醫療指導(事前制定的教育訓練/SOP)。", "trap": 0}, {"id": 1, "year": 110, "num": 2, "ans": 0, "cat": "EMS系統與法規", "sub": "法律責任", "text": "救護技術員對COVID-19病人因擔心感染而未進行必要急救，法律觀點何者正確？", "opts": ["家屬可主張救護技術員未依法行政而提出告訴", "家屬民事告訴時效為六個月", "救護技術員符合正當防衛與緊急避難", "救護技術員可主張病人與有過失"], "explain": "", "trap": 0}, {"id": 2, "year": 110, "num": 3, "ans": 1, "cat": "EMS系統與法規", "sub": "感染防護", "text": "救護技術員發生疑似愛滋病毒暴露時，緊急處置何者正確？", "opts": ["扎傷處應立即以大量優碘消毒", "暴露處為黏膜(如眼睛)則大量沖水即可", "必須於72小時內向工作單位通報", "暴露後3個月、6個月、1年追蹤三次抗體"], "explain": "黏膜暴露大量沖水即可。扎傷用肥皂和水(非優碘)，24hr內通報(非72hr)。", "trap": 1}, {"id": 3, "year": 110, "num": 4, "ans": 0, "cat": "EMS系統與法規", "sub": "派遣系統", "text": "依據國際緊急派遣協會定義，公共場所目擊OHCA的派遣等級是？", "opts": ["E (ECHO)", "A (ALPHA)", "C (CHARLIE)", "O (OMEGA)"], "explain": "", "trap": 0}, {"id": 4, "year": 110, "num": 5, "ans": 1, "cat": "EMS系統與法規", "sub": "品質管理", "text": "進行區域EMS重大外傷品管時，哪一類傷患死亡應深入了解品管？", "opts": ["ISS低且RTS低", "ISS低且RTS高", "ISS高且RTS低", "ISS高且RTS高"], "explain": "ISS低(傷不重)+RTS高(生理好)卻死亡→品管問題。", "trap": 1}, {"id": 5, "year": 110, "num": 6, "ans": 3, "cat": "EMS系統與法規", "sub": "教學方法", "text": "G-A-S模式中「獲取資訊」的最恰當詢問方式？", "opts": ["您為什麼沒有進行OOO的處置？", "您之前是否沒有遇過這種情境？", "如果我是您，您覺得我會怎麼作？", "當病人發生XXX時，您當時的心情或想法是什麼？"], "explain": "", "trap": 0}, {"id": 6, "year": 110, "num": 7, "ans": 3, "cat": "EMS系統與法規", "sub": "研究方法", "text": "以google表單完成碩士論文問卷研究，何者正確？", "opts": ["認識同仁填問卷不需知情同意書", "減少選擇偏差需專家內容效度", "減少測量偏差需分層與抽樣", "增加研究信度可再次請受訪者填答"], "explain": "再測信度是經一段時間後再次施測評估穩定性。", "trap": 0}, {"id": 7, "year": 110, "num": 8, "ans": 1, "cat": "基礎醫學", "sub": "呼吸生理", "text": "關於血液中氧氣與二氧化碳運輸，何者為是？", "opts": ["直接溶解的氧氣量大於與血紅素結合", "一個血紅素分子可攜帶4個氧氣分子，PaO2 80-100mmHg時飽和", "CO2有兩種型態，直接溶解約佔8%", "PaO2 40mmHg時，90%以上血紅素已攜帶氧"], "explain": "Hb攜帶4個O2；CO2有三種型態；PaO2 40≈75%飽和。", "trap": 0}, {"id": 8, "year": 110, "num": 9, "ans": 1, "cat": "基礎醫學", "sub": "神經解剖", "text": "關於腦部解剖構造，何者為是？", "opts": ["丘腦監督維持身體姿勢的肌肉", "下視丘含口渴中樞、體溫中樞、攝食中樞", "心血管中樞及呼吸節律中樞位於橋腦", "大腦包含感覺訊息轉遞處理中樞"], "explain": "下視丘調控體溫、口渴、攝食、自主神經。(A)小腦(C)延腦(D)丘腦。", "trap": 0}, {"id": 9, "year": 110, "num": 10, "ans": 2, "cat": "藥理學", "sub": "抗心律不整藥", "text": "關於Amiodarone以下敘述何者為非？", "opts": ["屬Class III抗心律不整藥", "可能引致心臟收縮力降低、血管擴張", "嚴禁用於嚴重心臟功能受損患者", "藥效半生期長可至40天"], "explain": "Amiodarone可用於心功能受損者，「嚴禁」是錯的。", "trap": 1}, {"id": 10, "year": 110, "num": 11, "ans": 1, "cat": "創傷", "sub": "燒燙傷", "text": "60歲男性75kg，一度10%二度18%三度9%，兩套標準輸液套管，前8小時每套每分鐘幾滴？", "opts": ["84", "42", "21", "63"], "explain": "不含一度→27%。2ml×75×27=4050ml。前8hr給半=2025。兩套各1012.5/480min×20滴=42滴。", "trap": 1}, {"id": 11, "year": 110, "num": 12, "ans": 3, "cat": "基礎醫學", "sub": "血液學", "text": "關於血液的組成，何者為是？", "opts": ["血液大部分由紅血球組成佔55-60%", "紅血球壽命120天，比例僅次於白血球", "O型血漿不含A或B抗體", "血漿中水份約佔九成"], "explain": "血漿約佔55%，血球45%。血漿水份約90%。O型有anti-A和anti-B抗體。", "trap": 0}, {"id": 12, "year": 110, "num": 13, "ans": 0, "cat": "藥理學", "sub": "藥理學總論", "text": "有關藥理學名詞，何者正確？", "opts": ["拮抗作用：併用藥物效果總和小於個別加總(1+1<2)", "禁忌症：藥物治療劑量內不希望但無法避免的效果", "藥物過敏：被另一種藥物影響產生增減藥效", "適應性：重複使用藥物效果增強需調低劑量"], "explain": "(B)是副作用(C)是交互作用(D)適應性是效果減弱需增加劑量。", "trap": 0}, {"id": 13, "year": 110, "num": 14, "ans": 1, "cat": "基礎醫學", "sub": "呼吸生理", "text": "呼吸中通氣量和潮氣容積的描述，何者為是？", "opts": ["正常潮氣容積為5000-6000ml", "計算肺泡潮氣量需減掉氣道容積", "潮氣容積等於通氣量乘以呼吸次數", "通氣量每人固定不變"], "explain": "潮氣容積約500ml。肺泡通氣量=潮氣容積-死腔。通氣量=潮氣容積×呼吸次數。", "trap": 0}, {"id": 14, "year": 110, "num": 15, "ans": 0, "cat": "基礎醫學", "sub": "呼吸監測", "text": "正常生理狀況下，二氧化碳濃度圖儀監測何者為是？", "opts": ["CO2分壓在吸氣階段可降至0", "潮氣末CO2分壓位於吐氣起點", "開始吐氣CO2分壓值最高後下降", "CPR中EtCO2突然上升代表插管滑脫"], "explain": "吸氣時吸入新鮮空氣，CO2可降至0。EtCO2位於吐氣末(非起點)。CPR中突升可能ROSC。", "trap": 0}, {"id": 15, "year": 110, "num": 16, "ans": 0, "cat": "病史詢問與評估", "sub": "病史詢問", "text": "關於病患病史詢問內容，正確的觀念是？", "opts": ["主訴包括主要自覺症狀及症狀發生持續時間", "現病史第一重點是釐清患者身分特徵", "詢問發生狀況指病患反應及是否有人處置", "加劇或緩解因素是判斷危急個案的必要條件"], "explain": "主訴必須包含症狀+時間。現病史第一重點是chief complaint的詳細描述。", "trap" // ============================================================
// STATE
// ============================================================
let mode='all', currentQ=[], qIdx=0, answers=[], sessionWrong=[], filterYears=[], filterCats=[];
const CATS=[...new Set(Q.map(q=>q.cat))].sort();
const YEARS=[110,111,112,113];

function getWrongIds(){return JSON.parse(localStorage.getItem('emtp_wrong')||'[]')}
function setWrongIds(ids){localStorage.setItem('emtp_wrong',JSON.stringify([...new Set(ids)]))}
function getHistory(){return JSON.parse(localStorage.getItem('emtp_history')||'[]')}
function addHistory(h){const arr=getHistory();arr.unshift(h);if(arr.length>100)arr.length=100;localStorage.setItem('emtp_history',JSON.stringify(arr))}
function getTotalStats(){const h=getHistory();if(!h.length)return{total:0,acc:0,wrong:getWrongIds().length};const t=h.reduce((a,b)=>a+b.total,0);const c=h.reduce((a,b)=>a+b.correct,0);return{total:t,acc:t?Math.round(c/t*100):0,wrong:getWrongIds().length}}

// ============================================================
// NAVIGATION
// ============================================================
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');window.scrollTo(0,0)}

function goHome(){
  show('home');
  const s=getTotalStats();
  document.getElementById('s-total').textContent=s.total;
  document.getElementById('s-acc').textContent=s.acc+'%';
  document.getElementById('s-wrong').textContent=s.wrong;
  const wc=getWrongIds().length;
  document.getElementById('wrong-count-label').textContent=wc?`目前有 ${wc} 題錯題待複習`:'尚無錯題紀錄';
}

function goFilter(m){
  mode=m;
  if(m==='random'){
    currentQ=shuffle([...Q]).slice(0,25);
    qIdx=0;answers=[];sessionWrong=[];
    show('quiz');
    document.getElementById('quiz-title').textContent='隨機挑戰 25題';
    renderQuestion();
    return;
  }
  if(m==='wrong'){
    const wids=getWrongIds();
    if(!wids.length){alert('目前沒有錯題紀錄！');return}
    currentQ=Q.filter(q=>wids.includes(q.id));
    currentQ=shuffle(currentQ);
    qIdx=0;answers=[];sessionWrong=[];
    show('quiz');
    document.getElementById('quiz-title').textContent=`錯題複習 ${currentQ.length}題`;
    renderQuestion();
    return;
  }
  if(m==='trap'){
    currentQ=Q.filter(q=>q.trap);
    currentQ=shuffle(currentQ);
    qIdx=0;answers=[];sessionWrong=[];
    show('quiz');
    document.getElementById('quiz-title').textContent=`陷阱題特訓 ${currentQ.length}題`;
    renderQuestion();
    return;
  }
  filterYears=[...YEARS];filterCats=[...CATS];
  renderFilter();
  show('filter');
}

function renderFilter(){
  const yc=document.getElementById('year-chips');
  yc.innerHTML=YEARS.map(y=>{
    const cnt=Q.filter(q=>q.year===y).length;
    const sel=filterYears.includes(y)?'sel':'';
    return `<div class="chip ${sel}" onclick="toggleYear(${y})">${y}年<span class="count">(${cnt})</span></div>`;
  }).join('');
  const cc=document.getElementById('cat-chips');
  cc.innerHTML=CATS.map(c=>{
    const cnt=Q.filter(q=>q.cat===c).length;
    const sel=filterCats.includes(c)?'sel':'';
    return `<div class="chip ${sel}" onclick="toggleCat('${c}')">${c}<span class="count">(${cnt})</span></div>`;
  }).join('');
  updateFilterInfo();
}

function toggleYear(y){
  if(filterYears.includes(y))filterYears=filterYears.filter(x=>x!==y);else filterYears.push(y);
  renderFilter();
}
function toggleCat(c){
  if(filterCats.includes(c))filterCats=filterCats.filter(x=>x!==c);else filterCats.push(c);
  renderFilter();
}
function updateFilterInfo(){
  const filtered=Q.filter(q=>filterYears.includes(q.year)&&filterCats.includes(q.cat));
  document.getElementById('selected-info').textContent=`已選 ${filtered.length} 題`;
  document.getElementById('start-btn').disabled=filtered.length===0;
  document.getElementById('start-btn').textContent=filtered.length?`開始練習（${filtered.length}題）`:'請選擇範圍';
}

function startQuiz(){
  currentQ=shuffle(Q.filter(q=>filterYears.includes(q.year)&&filterCats.includes(q.cat)));
  qIdx=0;answers=[];sessionWrong=[];
  show('quiz');
  document.getElementById('quiz-title').textContent=`練習中`;
  renderQuestion();
}

// ============================================================
// QUIZ LOGIC
// ============================================================
function renderQuestion(){
  if(qIdx>=currentQ.length){showResult();return}
  const q=currentQ[qIdx];
  document.getElementById('prog').style.width=((qIdx/currentQ.length)*100)+'%';
  document.getElementById('q-num').textContent=`第 ${qIdx+1} / ${currentQ.length} 題`;
  document.getElementById('q-cat').textContent=`${q.year}年 #${q.num} ｜ ${q.sub}`;
  document.getElementById('q-text').textContent=q.text;
  const optDiv=document.getElementById('options');
  optDiv.innerHTML=q.opts.map((o,i)=>`<div class="option" onclick="pickAnswer(${i})" id="opt-${i}"><span class="letter">${'ABCD'[i]}</span><span>${o}</span></div>`).join('');
  document.getElementById('explain').classList.remove('show');
  document.getElementById('explain').textContent='';
  document.getElementById('next-btn').classList.remove('show');
}

function pickAnswer(i){
  const q=currentQ[qIdx];
  const opts=document.querySelectorAll('.option');
  opts.forEach(o=>o.classList.add('disabled'));
  const correct=q.ans;
  const isRight=i===correct;
  opts[i].classList.add(isRight?'correct':'wrong');
  if(!isRight){opts[correct].classList.add('correct');opts.forEach((o,j)=>{if(j!==i&&j!==correct)o.classList.add('dim')})}
  else{opts.forEach((o,j)=>{if(j!==correct)o.classList.add('dim')})}
  answers.push({qId:q.id,picked:i,correct,isRight});
  if(!isRight){
    sessionWrong.push(q);
    const wids=getWrongIds();wids.push(q.id);setWrongIds(wids);
  }else{
    let wids=getWrongIds();wids=wids.filter(x=>x!==q.id);setWrongIds(wids);
  }
  if(q.explain){
    document.getElementById('explain').textContent='💡 '+q.explain;
    document.getElementById('explain').classList.add('show');
  }
  document.getElementById('next-btn').classList.add('show');
  document.getElementById('next-btn').textContent=qIdx>=currentQ.length-1?'查看結果':'下一題 →';
}

function nextQuestion(){qIdx++;renderQuestion()}

function confirmQuit(){if(qIdx>0&&qIdx<currentQ.length){if(!confirm('確定要離開嗎？目前進度不會保存。'))return}if(answers.length>0)saveSession();goHome()}

function saveSession(){
  const correct=answers.filter(a=>a.isRight).length;
  addHistory({
    date:new Date().toLocaleString('zh-TW'),
    mode:mode==='wrong'?'錯題複習':mode==='trap'?'陷阱題特訓':mode==='random'?'隨機挑戰':'自選練習',
    total:answers.length,correct,
    wrong:answers.length-correct,
    pct:Math.round(correct/answers.length*100)
  });
}

// ============================================================
// RESULT
// ============================================================
function showResult(){
  saveSession();
  const correct=answers.filter(a=>a.isRight).length;
  const wrong=answers.length-correct;
  document.getElementById('r-score').textContent=Math.round(correct/answers.length*100)+'%';
  document.getElementById('r-total').textContent=`${correct} / ${answers.length} 題`;
  document.getElementById('r-correct').textContent=correct;
  document.getElementById('r-wrong').textContent=wrong;
  const rwBtn=document.getElementById('r-review-btn');
  rwBtn.style.display=sessionWrong.length?'flex':'none';
  const rwSec=document.getElementById('r-wrong-section');
  if(sessionWrong.length){
    rwSec.innerHTML=`<div class="wrong-summary"><h3>本次錯題 ${sessionWrong.length} 題</h3><p>${sessionWrong.map(q=>`${q.year}年 #${q.num} ${q.sub}`).join('、')}</p></div>`;
  }else{rwSec.innerHTML='<div style="text-align:center;padding:16px;color:var(--accent2);font-weight:600">🎉 全部答對！太棒了！</div>'}
  show('result');
}

function reviewWrong(){
  currentQ=shuffle([...sessionWrong]);
  qIdx=0;answers=[];sessionWrong=[];mode='wrong';
  show('quiz');
  document.getElementById('quiz-title').textContent=`錯題複習 ${currentQ.length}題`;
  renderQuestion();
}

// ============================================================
// HISTORY
// ============================================================
function goHistory(){
  const h=getHistory();
  const list=document.getElementById('history-list');
  if(!h.length){list.innerHTML='<div class="empty-state"><div class="big">📋</div><p>尚無練習紀錄<br>開始第一次練習吧！</p></div>';show('history');return}
  list.innerHTML=h.map((item,i)=>{
    const cls=item.pct>=80?'good':item.pct>=60?'mid':'bad';
    return `<div class="history-item"><div class="left"><h4>${item.mode}</h4><p>${item.date}</p></div><div class="right"><div class="pct ${cls}">${item.pct}%</div><div style="font-size:11px;color:var(--text3)">${item.correct}/${item.total}題</div></div></div>`;
  }).join('');
  list.innerHTML+=`<div style="text-align:center;margin:20px 0"><button onclick="if(confirm('確定清除所有紀錄？')){localStorage.clear();goHome()}" style="padding:10px 24px;border:1.5px solid var(--danger);color:var(--danger);background:none;border-radius:var(--radius);font-size:13px;cursor:pointer">清除所有紀錄</button></div>`;
  show('history');
}

// ============================================================
// UTILS
// ============================================================
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}

// INIT
goHome();

// Register SW
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{})}
</script>
